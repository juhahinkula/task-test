name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: install dependencies
        run: npm run install:all

      - name: audit
        run: npm audit

      - name: lint backend
        run: npm run lint:backend

      - name: lint frontend
        run: npm run lint:frontend

      - name: test backend
        run: npm run test:backend

      - name: test frontend
        run: npm run test:frontend
